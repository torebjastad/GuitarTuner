<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Guitar Tuner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="tuner-container">
        <h1 class="title">Tuner</h1>

        <div class="display-area">
            <div class="direction-indicator flat" id="flat-indicator">♭</div>
            <div class="note-display-group">
                <div class="note-name" id="note-name">-</div>
                <div class="frequency-text" id="frequency">0.00 Hz</div>
            </div>
            <div class="direction-indicator sharp" id="sharp-indicator">♯</div>
        </div>

        <div class="meter-container">
            <div class="meter-scale">
                <div class="marker center"></div>
                <div class="marker left-1"></div>
                <div class="marker right-1"></div>
            </div>
            <div class="needle" id="needle"></div>
        </div>

        <div class="status-indicator" id="tuning-status">Ready</div>

        <div class="action-group">
            <button id="start-btn" class="start-btn">Start Tuner</button>

            <select id="algorithm-select" class="algorithm-select">
                <option value="yin">YIN</option>
                <option value="mcleod" selected>McLeod MPM</option>
                <option value="autocorr">Autocorrelation</option>
                <option value="hps">Harmonic Product Spectrum</option>
                <option value="music">MUSIC (Subspace)</option>
                <option value="ultimate">Ultimate (Hybrid)</option>
            </select>

            <div class="slider-group">
                <span class="slider-label">Averaging: <span id="smoothing-val">333 ms</span></span>
                <div class="slider-container">
                    <span class="slider-icon">Snappy</span>
                    <input type="range" id="smoothing-slider" class="styled-slider" min="1" max="50" value="20"
                        step="1">
                    <span class="slider-icon">Stable</span>
                </div>
            </div>
        </div>

        <div class="debug-section">
            <label class="debug-label">
                <input type="checkbox" id="debug-toggle">
                Show Algorithm Debug
            </label>
            <div id="algo-params" class="algo-params-container" style="display: none;">
                <!-- Dynamically populated algorithm parameters -->
            </div>
            <div class="test-samples" id="test-samples" style="display: none;">
                <div class="test-samples-controls">
                    <select id="sample-dataset" class="sample-select"></select>
                    <select id="sample-tone" class="sample-select" disabled></select>
                    <button id="sample-play-btn" class="sample-btn" disabled title="Play audio">&#9654;</button>
                    <label class="sample-mute-label"><input type="checkbox" id="sample-mute"> Mute mic</label>
                </div>
            </div>
            <div class="debug-canvas-wrapper" style="display: none;">
                <canvas id="debug-canvas"></canvas>
                <div id="debug-info" class="debug-info"></div>
            </div>
        </div>

        <div class="test-tone-section">
            <div class="test-tone-label">Test Tones</div>
            <div class="test-tone-grid">
                <button class="tone-btn" data-string="0">
                    <span class="tone-name">E2</span>
                    <span class="tone-freq">82.4 Hz</span>
                </button>
                <button class="tone-btn" data-string="1">
                    <span class="tone-name">A2</span>
                    <span class="tone-freq">110.0 Hz</span>
                </button>
                <button class="tone-btn" data-string="2">
                    <span class="tone-name">D3</span>
                    <span class="tone-freq">146.8 Hz</span>
                </button>
                <button class="tone-btn" data-string="3">
                    <span class="tone-name">G3</span>
                    <span class="tone-freq">196.0 Hz</span>
                </button>
                <button class="tone-btn" data-string="4">
                    <span class="tone-name">B3</span>
                    <span class="tone-freq">246.9 Hz</span>
                </button>
                <button class="tone-btn" data-string="5">
                    <span class="tone-name">E4</span>
                    <span class="tone-freq">329.6 Hz</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Load scripts in dependency order -->
    <script src="pitch-common.js"></script>
    <script src="yin-detector.js"></script>
    <script src="autocorrelation-detector.js"></script>
    <script src="mcleod-detector.js"></script>
    <script src="hps-detector.js"></script>
    <script src="music-detector.js"></script>
    <script src="ultimate-detector.js"></script>
    <script src="debug-plot.js"></script>
    <script src="tuner.js"></script>
    <script src="test-tone-generator.js"></script>
    <script src="app.js"></script>
</body>

</html>
