<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Guitar Tuner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="tuner-container">
        <h1 class="title">Tuner</h1>

        <div class="controls">
            <select id="algorithm-select" class="algorithm-select">
                <option value="yin">YIN (Accurate)</option>
                <option value="mcleod">McLeod MPM</option>
                <option value="autocorr">Autocorrelation (Fast)</option>
            </select>
        </div>

        <div class="display-area">
            <div class="direction-indicator flat" id="flat-indicator">♭</div>
            <div class="note-display-group">
                <div class="note-name" id="note-name">-</div>
                <div class="frequency-text" id="frequency">0.00 Hz</div>
            </div>
            <div class="direction-indicator sharp" id="sharp-indicator">♯</div>
        </div>

        <div class="meter-container">
            <div class="meter-scale">
                <div class="marker center"></div>
                <div class="marker left-1"></div>
                <div class="marker right-1"></div>
            </div>
            <div class="needle" id="needle"></div>
        </div>

        <div class="status-indicator" id="tuning-status">Listening...</div>

        <button id="start-btn" class="start-btn">Start Tuner</button>

        <div class="debug-section">
            <label class="debug-label">
                <input type="checkbox" id="debug-toggle">
                Show Algorithm Debug
            </label>
            <div class="debug-canvas-wrapper" style="display: none;">
                <canvas id="debug-canvas"></canvas>
            </div>
        </div>

        <div class="test-tone-section">
            <div class="test-tone-label">Test Tones</div>
            <div class="test-tone-controls">
                <select id="test-tone-select" class="algorithm-select">
                    <option value="E2">E2 — 82.41 Hz</option>
                    <option value="A2">A2 — 110.00 Hz</option>
                    <option value="D3">D3 — 146.83 Hz</option>
                    <option value="G3">G3 — 196.00 Hz</option>
                    <option value="B3">B3 — 246.94 Hz</option>
                    <option value="E4">E4 — 329.63 Hz</option>
                </select>
                <button id="test-tone-btn" class="test-tone-btn">Play Tone</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
