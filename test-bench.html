<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitch Detection — Algorithm Test Bench</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --text: #e0e0e0;
            --muted: #888;
            --green: #4caf50;
            --yellow: #ff9800;
            --red: #f44336;
            --blue: #42a5f5;
            --border: #2a2a4a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px;
            line-height: 1.5;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .controls {
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            background: var(--blue);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        button:hover {
            opacity: 0.85;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .config {
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .config label {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .config input[type="number"],
        .config select {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 3px 6px;
            font-size: 0.85rem;
        }

        .config input[type="number"] {
            width: 75px;
        }

        .config select {
            min-width: 140px;
        }

        #status {
            font-size: 0.85rem;
            color: var(--muted);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
            margin-top: 12px;
        }

        th {
            background: var(--card);
            padding: 8px 6px;
            text-align: left;
            border-bottom: 2px solid var(--border);
            position: sticky;
            top: 0;
            white-space: nowrap;
        }

        td {
            padding: 6px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        .play-col {
            width: 32px;
            text-align: center;
        }

        .play-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            width: 28px;
            height: 28px;
            padding: 0;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.75rem;
            line-height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn:hover {
            border-color: var(--blue);
            color: var(--blue);
        }

        .play-btn.playing {
            border-color: var(--yellow);
            color: var(--yellow);
        }

        .file-col {
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: monospace;
            font-size: 0.78rem;
        }

        .expected-col {
            font-weight: bold;
        }

        .result-cell {
            font-family: monospace;
        }

        .pass {
            color: var(--green);
        }

        .close {
            color: var(--yellow);
        }

        .fail {
            color: var(--red);
        }

        .no-detect {
            color: var(--muted);
            font-style: italic;
        }

        .section-header td {
            background: var(--card);
            font-weight: bold;
            padding: 10px 6px 6px;
            font-size: 0.9rem;
            border-bottom: 2px solid var(--border);
        }

        .dataset-header td {
            background: #1e2a45;
            font-weight: bold;
            padding: 12px 6px 8px;
            font-size: 1rem;
            border-bottom: 2px solid var(--blue);
            color: var(--blue);
        }

        /* Summary row */
        .summary-row td {
            background: var(--card);
            font-weight: bold;
            border-top: 2px solid var(--border);
            padding: 10px 6px;
        }

        .algo-header {
            text-align: center;
        }

        .algo-sub {
            font-size: 0.7rem;
            color: var(--muted);
            font-weight: normal;
        }

        .legend {
            margin-top: 12px;
            font-size: 0.8rem;
            color: var(--muted);
        }

        .legend span {
            margin-right: 16px;
        }

        .algo-checks {
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 0.85rem;
            color: var(--muted);
            flex-wrap: wrap;
        }

        .algo-checks label {
            display: flex;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            user-select: none;
        }

        .algo-checks input[type="checkbox"] {
            accent-color: var(--blue);
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>Pitch Detection — Algorithm Test Bench</h1>

    <div class="controls">
        <button id="run-btn">Run All Tests</button>
        <div class="config">
            <label>Dataset:
                <select id="dataset-select">
                    <option value="nylon">Nylon Guitar (Speedy)</option>
                    <option value="plucked">Plucked Guitar (Skamos66)</option>
                    <option value="piano">Piano (UIowa mf)</option>
                    <option value="all">All Datasets</option>
                </select>
            </label>
            <label>Sample at:
                <input type="number" id="sample-time" value="1.0" min="0.1" max="5" step="0.1"> sec
            </label>
            <label>Window:
                <input type="number" id="window-size" value="4096" min="2048" max="65536" step="1024">
                samples
            </label>
            <label>Averaging:
                <input type="number" id="avg-ms" value="0" min="0" max="2000" step="10">
                ms
            </label>
        </div>
        <span id="status">Ready</span>
    </div>
    <div class="algo-checks">
        Algorithms:
        <label><input type="checkbox" class="algo-check" value="yin" checked> YIN</label>
        <label><input type="checkbox" class="algo-check" value="mcleod" checked> McLeod</label>
        <label><input type="checkbox" class="algo-check" value="autocorr" checked> Autocorr</label>
        <label><input type="checkbox" class="algo-check" value="hps" checked> HPS</label>
        <label><input type="checkbox" class="algo-check" value="music" checked> MUSIC</label>
    </div>

    <table id="results">
        <thead id="results-head">
        </thead>
        <tbody id="results-body"></tbody>
    </table>

    <div class="legend">
        <span class="pass">&#9632; Correct note, &lt;10&cent;</span>
        <span class="close">&#9632; Correct note, 10–50&cent;</span>
        <span class="fail">&#9632; Wrong note or &gt;50&cent;</span>
        <span class="no-detect">&#9632; No detection</span>
    </div>

    <!-- Load detector scripts in dependency order -->
    <script src="pitch-common.js"></script>
    <script src="yin-detector.js"></script>
    <script src="autocorrelation-detector.js"></script>
    <script src="mcleod-detector.js"></script>
    <script src="hps-detector.js"></script>
    <script src="music-detector.js"></script>

    <script>
        // ---- Helpers ----

        const NOTE_STRINGS = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const ALL_ALGO_KEYS = ['yin', 'mcleod', 'autocorr', 'hps', 'music'];
        const ALGO_LABELS = { yin: 'YIN', mcleod: 'McLeod', autocorr: 'Autocorr', hps: 'HPS', music: 'MUSIC' };

        function getSelectedAlgos() {
            return Array.from(document.querySelectorAll('.algo-check:checked')).map(cb => cb.value);
        }

        function noteFreq(note, octave) {
            const semitones = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };
            const midi = (octave + 1) * 12 + semitones[note];
            return Math.round(440 * Math.pow(2, (midi - 69) / 12) * 100) / 100;
        }

        function freqToNoteName(freq) {
            const midi = Math.round(12 * Math.log2(freq / 440) + 69);
            const name = NOTE_STRINGS[midi % 12];
            const octave = Math.floor(midi / 12) - 1;
            return name + octave;
        }

        function centsDiff(detected, expected) {
            return 1200 * Math.log2(detected / expected);
        }

        function shortFileName(filename) {
            return filename
                .replace(/__speedy__clean_/, '\u2026')
                .replace(/\d+__skamos66__/, '')
                .replace(/^Piano\.mf\./, '');
        }

        function formatResult(detected, expected) {
            if (detected === -1 || isNaN(detected) || detected < TunerDefaults.MIN_FREQUENCY || detected > TunerDefaults.MAX_FREQUENCY) {
                if (expected === null) {
                    return { html: '\u2014 (correct)', cls: 'pass' };
                }
                return { html: '\u2014', cls: 'no-detect' };
            }

            const noteName = freqToNoteName(detected);

            if (expected === null) {
                return { html: `${detected.toFixed(1)} Hz (${noteName})`, cls: 'fail' };
            }

            const cents = centsDiff(detected, expected);
            const expectedNote = freqToNoteName(expected);
            const absCents = Math.abs(cents);
            const centsStr = (cents >= 0 ? '+' : '') + cents.toFixed(1) + '\u00A2';

            let cls;
            if (noteName !== expectedNote) {
                cls = 'fail';
            } else if (absCents < 10) {
                cls = 'pass';
            } else if (absCents < 50) {
                cls = 'close';
            } else {
                cls = 'fail';
            }

            return {
                html: `${detected.toFixed(1)} Hz ${centsStr}`,
                cls: cls
            };
        }

        // ---- Dataset definitions ----

        const DATASETS = {
            nylon: {
                name: "Nylon Guitar (Speedy)",
                dir: "TestData/Nylon-guitar-single-notes/",
                files: [
                    { section: "Low E String \u2014 E2" },
                    { file: "8396__speedy__clean_e_str_pick.wav", expected: 82.41, note: "E2" },
                    { file: "8397__speedy__clean_e_str_pluck.wav", expected: 82.41, note: "E2" },
                    { file: "8395__speedy__clean_e_harm.wav", expected: 164.81, note: "E3" },

                    { section: "A String \u2014 A2" },
                    { file: "8382__speedy__clean_a_str_pick.wav", expected: 110.00, note: "A2" },
                    { file: "8383__speedy__clean_a_str_pluck.wav", expected: 110.00, note: "A2" },
                    { file: "8381__speedy__clean_a_harm.wav", expected: 220.00, note: "A3" },

                    { section: "D String \u2014 D3" },
                    { file: "8388__speedy__clean_d_str_pick.wav", expected: 146.83, note: "D3" },
                    { file: "8389__speedy__clean_d_str_pluck.wav", expected: 146.83, note: "D3" },
                    { file: "8387__speedy__clean_d_harm.wav", expected: 293.66, note: "D4" },

                    { section: "G String \u2014 G3" },
                    { file: "8402__speedy__clean_g_str_pick.wav", expected: 196.00, note: "G3" },
                    { file: "8403__speedy__clean_g_str_pluck.wav", expected: 196.00, note: "G3" },
                    { file: "8401__speedy__clean_g_harm1.wav", expected: 392.00, note: "G4" },

                    { section: "B String \u2014 B3" },
                    { file: "8385__speedy__clean_b_str_pick.wav", expected: 246.94, note: "B3" },
                    { file: "8386__speedy__clean_b_str_pluck.wav", expected: 246.94, note: "B3" },
                    { file: "8384__speedy__clean_b_harm.wav", expected: 493.88, note: "B4" },

                    { section: "High E String \u2014 E4" },
                    { file: "8393__speedy__clean_e1st_str_pick.wav", expected: 329.63, note: "E4" },
                    { file: "8394__speedy__clean_e1st_str_pluck.wav", expected: 329.63, note: "E4" },
                    { file: "8392__speedy__clean_e1st_harm.wav", expected: 659.26, note: "E5" },
                    { file: "8391__speedy__clean_e1st_5th.wav", expected: 440.00, note: "A4" },
                    { file: "8390__speedy__clean_e1st_12th.wav", expected: 659.26, note: "E5" },
                ]
            },
            plucked: {
                name: "Plucked Guitar (Skamos66)",
                dir: "TestData/22511__skamos66__plucked-guitar-notes/",
                files: buildPluckedDataset()
            },
            piano: {
                name: "Piano (UIowa mf)",
                dir: "TestData/UIowa-Piano-mf/",
                files: buildUIowaPianoDataset()
            }
        };

        function buildPluckedDataset() {
            const rawFiles = [
                "399469__skamos66__a1.wav",
                "399468__skamos66__a2.wav",
                "399467__skamos66__a3.wav",
                "399466__skamos66__a4.wav",
                "399473__skamos66__a5.wav",
                "399472__skamos66__a6.wav",
                "399471__skamos66__b1.wav",
                "399470__skamos66__b2.wav",
                "399475__skamos66__b3.wav",
                "399474__skamos66__b4.wav",
                "399491__skamos66__b5.wav",
                "399490__skamos66__b6.wav",
                "399489__skamos66__c1.wav",
                "399488__skamos66__c2.wav",
                "399495__skamos66__c3.wav",
                "399494__skamos66__c4.wav",
                "399493__skamos66__c5.wav",
                "399492__skamos66__c6.wav",
                "399497__skamos66__d1.wav",
                "399496__skamos66__d2.wav",
                "399482__skamos66__d3.wav",
                "399483__skamos66__d4.wav",
                "399480__skamos66__d5.wav",
                "399481__skamos66__d6.wav",
                "399486__skamos66__e1.wav",
                "399487__skamos66__e2.wav",
                "399484__skamos66__e3.wav",
                "399485__skamos66__e4.wav",
                "399478__skamos66__e5.wav",
                "399479__skamos66__e6.wav",
                "399501__skamos66__f1.wav",
                "399500__skamos66__f2.wav",
                "399503__skamos66__f3.wav",
                "399502__skamos66__f4.wav",
                "399505__skamos66__f5.wav",
                "399504__skamos66__f6.wav",
                "399507__skamos66__g1.wav",
                "399506__skamos66__g2.wav",
                "399499__skamos66__g3.wav",
                "399498__skamos66__g4.wav",
                "399476__skamos66__g5.wav",
                "399477__skamos66__g6.wav",
            ];

            const noteOrder = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];

            // Parse and group by octave
            const byOctave = {};
            for (const file of rawFiles) {
                const m = file.match(/__([a-g])(\d)\.wav$/);
                if (!m) continue;
                const note = m[1].toUpperCase();
                const octave = parseInt(m[2]);
                if (!byOctave[octave]) byOctave[octave] = [];
                byOctave[octave].push({ file, note, octave });
            }

            const entries = [];
            for (const oct of Object.keys(byOctave).sort((a, b) => a - b)) {
                entries.push({ section: `Octave ${oct}` });
                byOctave[oct].sort((a, b) => noteOrder.indexOf(a.note) - noteOrder.indexOf(b.note));
                for (const item of byOctave[oct]) {
                    entries.push({
                        file: item.file,
                        expected: noteFreq(item.note, item.octave),
                        note: `${item.note}${item.octave}`
                    });
                }
            }
            return entries;
        }

        function buildUIowaPianoDataset() {
            // UIowa MIS Piano samples (mezzo-forte), B0–C8, 85 AIFF files.
            // Filenames use flat notation (Db, Eb, Gb, Ab, Bb).
            const semitoneMap = {
                'C': 0, 'Db': 1, 'D': 2, 'Eb': 3, 'E': 4, 'F': 5,
                'Gb': 6, 'G': 7, 'Ab': 8, 'A': 9, 'Bb': 10, 'B': 11
            };
            const displayName = {
                'C': 'C', 'Db': 'C#', 'D': 'D', 'Eb': 'D#', 'E': 'E', 'F': 'F',
                'Gb': 'F#', 'G': 'G', 'Ab': 'G#', 'A': 'A', 'Bb': 'A#', 'B': 'B'
            };
            const noteOrder = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];

            // Build file list from known range: B0, C1..B1, C2..B2, ..., C7..B7, C8
            const files = [];
            // B0 is the lowest note
            files.push({ note: 'B', octave: 0 });
            for (let oct = 1; oct <= 7; oct++) {
                for (const n of noteOrder) files.push({ note: n, octave: oct });
            }
            files.push({ note: 'C', octave: 8 });

            const entries = [];
            let currentOct = -1;
            for (const item of files) {
                if (item.octave !== currentOct) {
                    currentOct = item.octave;
                    entries.push({ section: `Octave ${currentOct}` });
                }
                const midi = (item.octave + 1) * 12 + semitoneMap[item.note];
                const freq = Math.round(440 * Math.pow(2, (midi - 69) / 12) * 100) / 100;
                entries.push({
                    file: `Piano.mf.${item.note}${item.octave}.ogg`,
                    expected: freq,
                    note: `${displayName[item.note]}${item.octave}`
                });
            }
            return entries;
        }

        function getActiveTestList(datasetKey) {
            if (datasetKey === 'all') {
                const combined = [];
                for (const [key, ds] of Object.entries(DATASETS)) {
                    combined.push({ datasetHeader: ds.name });
                    for (const entry of ds.files) {
                        if (entry.section) {
                            combined.push(entry);
                        } else {
                            combined.push({ ...entry, dir: ds.dir });
                        }
                    }
                }
                return combined;
            }
            const ds = DATASETS[datasetKey];
            return ds.files.map(entry =>
                entry.section ? entry : { ...entry, dir: ds.dir }
            );
        }

        // ---- Audio playback ----

        let _playbackCtx = null;
        let _playbackSource = null;
        let _activePlayBtn = null;

        async function playFile(dir, filename, btn) {
            if (_playbackSource) {
                _playbackSource.stop();
                _playbackSource = null;
            }
            if (_activePlayBtn) {
                _activePlayBtn.classList.remove('playing');
                _activePlayBtn.textContent = '\u25B6';
            }

            if (_activePlayBtn === btn) {
                _activePlayBtn = null;
                return;
            }

            if (!_playbackCtx) {
                _playbackCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (_playbackCtx.state === 'suspended') {
                await _playbackCtx.resume();
            }

            try {
                const url = dir + encodeURIComponent(filename);
                const response = await fetch(url);
                const arrayBuf = await response.arrayBuffer();
                const audioBuffer = await new Promise((resolve, reject) => {
                    _playbackCtx.decodeAudioData(arrayBuf, resolve, reject);
                });

                _playbackSource = _playbackCtx.createBufferSource();
                _playbackSource.buffer = audioBuffer;
                _playbackSource.connect(_playbackCtx.destination);

                btn.classList.add('playing');
                btn.textContent = '\u25A0';
                _activePlayBtn = btn;

                _playbackSource.onended = () => {
                    btn.classList.remove('playing');
                    btn.textContent = '\u25B6';
                    if (_activePlayBtn === btn) _activePlayBtn = null;
                    _playbackSource = null;
                };

                _playbackSource.start();
            } catch (err) {
                console.error('Playback error:', err);
            }
        }

        // ---- Main test runner ----

        /**
         * Run detector on multiple overlapping frames and return median (like the tuner's smoothing).
         * avgMs is the total averaging window in milliseconds. Frames are spaced ~16ms apart
         * (simulating 60fps RAF loop), starting at startSample.
         */
        function detectWithAveraging(detector, channelData, sampleRate, startSample, windowSize, avgMs) {
            const avgCount = avgMs > 0 ? Math.max(2, Math.round(avgMs / 16.67)) : 1;
            if (avgCount <= 1) {
                // Single shot — no averaging
                let buffer;
                if (startSample + windowSize <= channelData.length) {
                    buffer = channelData.slice(startSample, startSample + windowSize);
                } else if (channelData.length >= windowSize) {
                    buffer = channelData.slice(channelData.length - windowSize);
                } else {
                    buffer = new Float32Array(windowSize);
                    buffer.set(channelData);
                }
                return detector.getPitch(buffer, sampleRate);
            }

            // Step between frames: ~16ms at the file's sample rate (simulates 60fps)
            const frameStep = Math.floor(sampleRate / 60);
            const readings = [];

            for (let i = 0; i < avgCount; i++) {
                const offset = startSample + i * frameStep;
                let buffer;
                if (offset + windowSize <= channelData.length) {
                    buffer = channelData.slice(offset, offset + windowSize);
                } else if (channelData.length >= windowSize) {
                    buffer = channelData.slice(channelData.length - windowSize);
                } else {
                    buffer = new Float32Array(windowSize);
                    buffer.set(channelData);
                }

                const freq = detector.getPitch(buffer, sampleRate);
                if (freq > 0 && !isNaN(freq) &&
                    freq >= TunerDefaults.MIN_FREQUENCY &&
                    freq <= TunerDefaults.MAX_FREQUENCY) {
                    readings.push(freq);
                }
            }

            if (readings.length === 0) return -1;
            readings.sort((a, b) => a - b);
            return readings[Math.floor(readings.length / 2)];
        }

        async function runTests() {
            const runBtn = document.getElementById('run-btn');
            const statusEl = document.getElementById('status');
            const thead = document.getElementById('results-head');
            const tbody = document.getElementById('results-body');

            const algoKeys = getSelectedAlgos();
            if (algoKeys.length === 0) {
                statusEl.textContent = 'Select at least one algorithm.';
                return;
            }

            runBtn.disabled = true;
            thead.innerHTML = '';
            tbody.innerHTML = '';
            statusEl.textContent = 'Initializing...';

            const colSpan = 3 + algoKeys.length;

            // Build table header
            const headTr = document.createElement('tr');
            headTr.innerHTML = '<th></th><th>File</th><th>Expected</th>' +
                algoKeys.map(k => `<th class="algo-header">${ALGO_LABELS[k]}<br><span class="algo-sub">Hz / cents</span></th>`).join('');
            thead.appendChild(headTr);

            const datasetKey = document.getElementById('dataset-select').value;
            const sampleTime = parseFloat(document.getElementById('sample-time').value);
            const windowSize = parseInt(document.getElementById('window-size').value);
            const avgMs = parseInt(document.getElementById('avg-ms').value) || 0;

            const testList = getActiveTestList(datasetKey);

            // Create detectors
            const allDetectors = {
                yin: new YinDetector(),
                mcleod: new McLeodDetector(),
                autocorr: new AutocorrelationDetector(),
                hps: new HpsDetector(),
                music: new MusicDetector()
            };

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // Track scores per algorithm
            const scores = {};
            for (const key of algoKeys) {
                scores[key] = { pass: 0, close: 0, fail: 0, noDetect: 0, total: 0 };
            }

            const testEntries = testList.filter(t => !t.section && !t.datasetHeader);
            let completed = 0;

            for (const entry of testList) {
                if (entry.datasetHeader) {
                    const tr = document.createElement('tr');
                    tr.className = 'dataset-header';
                    tr.innerHTML = `<td colspan="${colSpan}">${entry.datasetHeader}</td>`;
                    tbody.appendChild(tr);
                    continue;
                }

                if (entry.section) {
                    const tr = document.createElement('tr');
                    tr.className = 'section-header';
                    tr.innerHTML = `<td colspan="${colSpan}">${entry.section}</td>`;
                    tbody.appendChild(tr);
                    continue;
                }

                completed++;
                statusEl.textContent = `Testing ${completed}/${testEntries.length}: ${entry.note}...`;

                const tr = document.createElement('tr');

                // Play button
                const tdPlay = document.createElement('td');
                tdPlay.className = 'play-col';
                const playBtn = document.createElement('button');
                playBtn.className = 'play-btn';
                playBtn.textContent = '\u25B6';
                playBtn.title = 'Play ' + entry.file;
                const entryDir = entry.dir;
                const entryFile = entry.file;
                playBtn.addEventListener('click', () => playFile(entryDir, entryFile, playBtn));
                tdPlay.appendChild(playBtn);
                tr.appendChild(tdPlay);

                // File name
                const tdFile = document.createElement('td');
                tdFile.className = 'file-col';
                tdFile.title = entry.file;
                tdFile.textContent = shortFileName(entry.file);
                tr.appendChild(tdFile);

                // Expected
                const tdExpected = document.createElement('td');
                tdExpected.className = 'expected-col';
                tdExpected.textContent = `${entry.note} (${entry.expected} Hz)`;
                tr.appendChild(tdExpected);

                // Load audio
                let audioBuffer;
                try {
                    const url = entry.dir + encodeURIComponent(entry.file);
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP ${response.status} for ${entry.file}`);
                    const arrayBuf = await response.arrayBuffer();
                    audioBuffer = await new Promise((resolve, reject) => {
                        audioCtx.decodeAudioData(arrayBuf, resolve, reject);
                    });
                } catch (err) {
                    console.error(`Failed to load ${entry.file}:`, err);
                    for (const key of algoKeys) {
                        const td = document.createElement('td');
                        td.className = 'result-cell fail';
                        td.textContent = 'Load error';
                        td.title = err.message;
                        tr.appendChild(td);
                    }
                    tbody.appendChild(tr);
                    continue;
                }

                const sampleRate = audioBuffer.sampleRate;
                const channelData = audioBuffer.getChannelData(0);
                const startSample = Math.floor(sampleTime * sampleRate);

                // Run each detector (with averaging)
                for (const key of algoKeys) {
                    const td = document.createElement('td');
                    td.className = 'result-cell';

                    try {
                        const detected = detectWithAveraging(
                            allDetectors[key], channelData, sampleRate,
                            startSample, windowSize, avgMs
                        );
                        const result = formatResult(detected, entry.expected);
                        td.innerHTML = result.html;
                        td.classList.add(result.cls);

                        scores[key].total++;
                        if (result.cls === 'pass') scores[key].pass++;
                        else if (result.cls === 'close') scores[key].close++;
                        else if (result.cls === 'no-detect') scores[key].noDetect++;
                        else scores[key].fail++;
                    } catch (err) {
                        td.textContent = 'Error';
                        td.classList.add('fail');
                        scores[key].total++;
                        scores[key].fail++;
                        console.error(`${key} error on ${entry.file}:`, err);
                    }

                    tr.appendChild(td);
                }

                tbody.appendChild(tr);
                await new Promise(r => setTimeout(r, 0));
            }

            // Summary row
            const summaryTr = document.createElement('tr');
            summaryTr.className = 'summary-row';

            const tdLabel = document.createElement('td');
            tdLabel.colSpan = 3;
            tdLabel.textContent = 'TOTALS';
            summaryTr.appendChild(tdLabel);

            for (const key of algoKeys) {
                const s = scores[key];
                const td = document.createElement('td');
                td.innerHTML = `<span class="pass">${s.pass}</span> / ` +
                    `<span class="close">${s.close}</span> / ` +
                    `<span class="fail">${s.fail}</span> / ` +
                    `<span class="no-detect">${s.noDetect}</span>`;
                summaryTr.appendChild(td);
            }
            tbody.appendChild(summaryTr);

            await audioCtx.close();
            const avgLabel = avgMs > 0 ? ` (${avgMs} ms averaging)` : '';
            statusEl.textContent = `Done \u2014 ${testEntries.length} files tested${avgLabel}.`;
            runBtn.disabled = false;
        }

        document.getElementById('run-btn').addEventListener('click', runTests);
    </script>
</body>

</html>
